name: ASX AI Bot

on:
  workflow_dispatch:
  schedule:
    # AEDT (UTC+11): active October–April
    # - cron: '55 21 * * 0-4'  # targets 10:00 AM Sydney (scheduled 8:55 AM, -65min buffer)
    # - cron: '55 23 * * 0-4'  # targets 12:00 PM Sydney (scheduled 10:55 AM, -65min buffer)
    # - cron: '55 1 * * 1-5'   # targets  2:00 PM Sydney (scheduled 12:55 PM, -65min buffer)
    #- cron: '55 3 * * 1-5'   # targets  4:00 PM Sydney (scheduled  2:55 PM, -65min buffer)

    # AEST (UTC+10): active April–October (Starts Saturday April 4th)
    - cron: '55 22 * * 0-4'  # targets 10:00 AM Sydney (scheduled 8:55 AM, -65min buffer)
    - cron: '55 0 * * 1-5'   # targets 12:00 PM Sydney (scheduled 10:55 AM, -65min buffer)
    - cron: '55 2 * * 1-5'   # targets  2:00 PM Sydney (scheduled 12:55 PM, -65min buffer)
    #- cron: '55 4 * * 1-5'   # targets  4:00 PM Sydney (scheduled  2:55 PM, -65min buffer)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run ASX bot
        env:
          AI_API_KEY:            ${{ secrets.AI_API_KEY }}
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
          ASX_LOGIN:             ${{ secrets.ASX_LOGIN }}
          ASX_PASSWORD:          ${{ secrets.ASX_PASSWORD }}
        run: python main.py
